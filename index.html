<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #cf5f95;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .instruction-box {
            background-color: #f8f9fa;
            border-left: 4px solid #0d6efd;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="text-center">Login</h2> 

        <form onsubmit="return authenticate()">
            <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="uname" class="form-control" placeholder="Username" required>
            </div>
            
            <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="pword" placeholder="Enter password" required>
            </div>
                
            <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="stayIn">
            <label class="form-check-label small" for="stayIn">Stay logged in</label>     
            </div>

            <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Login</button> 
            <button type="reset" class="btn btn-outline-secondary">Cancel</button>
            </div>
        </form>

      
    </div>

    <script>

        function authenticate() {
            var valerie3484 = document.getElementById('uname').value;
            var pwordVal = document.getElementById('pword').value; 
            if (valerie3484 === "divineGL") {
            alert("Welcome " + valerie3484 + "!");
            } else {
            alert("Incorrect username and/or password.");
            }
            return false;
        }
    </script>

</body>
</html>
